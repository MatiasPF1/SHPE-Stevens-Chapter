name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: SHPE-Stevens-Chapter/package-lock.json

      - name: Install dependencies
        working-directory: SHPE-Stevens-Chapter
        run: npm ci

      - name: Typecheck
        working-directory: SHPE-Stevens-Chapter
        run: npx tsc --noEmit

      - name: Lint
        working-directory: SHPE-Stevens-Chapter
        run: npm run lint

      - name: Build
        working-directory: SHPE-Stevens-Chapter
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npm run build
